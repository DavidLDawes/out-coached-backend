name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # The Firestore emulator (used by test:emulator) requires JDK 21+.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npx vitest run
      - run: npm install -g firebase-tools
      - run: npm run test:emulator

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - working-directory: functions
        run: npm ci

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - run: npm install -g firebase-tools

      - run: firebase deploy --only firestore:rules,firestore:indexes,functions --project out-coached --non-interactive
